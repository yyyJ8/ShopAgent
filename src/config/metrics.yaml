# OZON 业务口径配置
#
# 改 yaml 即可生效，不需要改代码。

# ── 业务口径 ──

metrics:

  动销率:
    formula: "有动销的SKU数 / 总SKU数 × 100%"
    data_source: get_daily_summary

  净利润率:
    formula: "净利润 / 营收 × 100%"
    data_source: get_daily_summary

  退货率:
    formula: "退货金额 / 销售额 × 100%"
    data_source: get_daily_summary

  广告DRR:
    formula: "广告花费 / 广告带来销售额 × 100%"
    warning_threshold: 5
    data_source: get_ad_performance

  广告转化率:
    formula: "广告订单数 / 广告点击数 × 100%"
    warning_threshold: 2
    data_source: get_ad_performance

  可售天数:
    formula: "当前库存 / 日均销量"
    data_source: get_stock_snapshot + get_daily_summary


# ── 异常检测规则 ──
#
# 多维度复合判定，require: all = 全部条件满足才触发。

anomaly_rules:

  SKU退货异常:
    type: "阈值"
    require: "all"
    data_source: get_daily_summary
    conditions:
      - field: returns_units
        op: "gte"
        value: 4
      - field: ordered_units
        op: "gte"
        value: 20
    description: "退货 ≥4件 且 月订单 ≥20 单"
    # NOTE: return_rate 列不存在，用 returns_units 做代理指标

  SKU利润率预警:
    type: "阈值"
    require: "all"
    data_source: get_daily_summary
    conditions:
      - field: profit_margin
        op: "lt"
        value: 10
    severity_map:
      critical: "< 0   → 亏损"
      warning:  "< 10  → 利润过低"

  广告DRR过高:
    type: "阈值"
    require: "all"
    data_source: get_ad_performance
    conditions:
      - field: drr_total
        op: "gte"
        value: 5
      - field: spend
        op: "gte"
        value: 500
    description: "DRR ≥5% 且 花费 ≥500₽"

  高点击低转化:
    type: "阈值"
    require: "all"
    data_source: get_ad_performance
    conditions:
      - field: ctr
        op: "gte"
        value: 3
      - field: spend
        op: "gte"
        value: 300
      - field: sold_units
        op: "lte"
        value: 1
    description: "CTR ≥3% 且 花费 ≥300₽ 且 成交≤1单 → 主图好但转化差"
    # NOTE: cvr 列不存在，用 sold_units≤1 作为转化差的代理指标

  SKU断货风险:
    type: "阈值"
    require: "all"
    data_source: get_stock_snapshot
    conditions:
      - field: present
        op: "lte"
        value: 10
    description: "库存 ≤10 件"

  SKU滞销积压:
    type: "阈值"
    require: "all"
    data_source: get_daily_summary
    conditions:
      - field: ordered_units
        op: "eq"
        value: 0
      - field: stock_present
        op: "gte"
        value: 20
    description: "当日0销售 且 库存 ≥20（连续多日需人工判断）"
    # NOTE: sales_days 列不存在，用 ordered_units=0 做单日代理。
    #       stock_present 在 sku_daily_summary 表中，无需跨源合并。
